name: Optimize Video
on:
  push:
    paths:
      - 'media/kit_familia_01.mp4'
      - '.github/workflows/optimize-video.yml'
permissions:
  contents: write
jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Prevent infinite loop
        run: |
          if git log -1 --pretty=%B | grep -q "Optimize video via GH Actions"; then
            echo "Last commit from this action; exiting"
            exit 0
          fi

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Recompress video
        run: |
          ffmpeg -y -i media/kit_familia_01.mp4 -c:v libx264 -crf 23 -preset medium -pix_fmt yuv420p -movflags +faststart -c:a aac -b:a 128k media/kit_familia_01_opt.mp4

      - name: Compare sizes and push if smaller
        run: |
          orig_size=$(stat -c%s media/kit_familia_01.mp4)
          opt_size=$(stat -c%s media/kit_familia_01_opt.mp4)
          echo "orig:$orig_size opt:$opt_size"
          if [ "$opt_size" -lt "$orig_size" ]; then
            mv media/kit_familia_01_opt.mp4 media/kit_familia_01.mp4
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add media/kit_familia_01.mp4
            git commit -m "Optimize video via GH Actions"
            git push
          else
            echo "Optimized file not smaller; skipping commit"
          fi
